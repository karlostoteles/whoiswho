<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cyber-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8A444"/>
      <stop offset="100%" stop-color="#D4922A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#E8A444" stroke-width="2" opacity="0.2"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#cyber-grad)" stroke-width="2" stroke-dasharray="40 10" opacity="0.8"/>
  
  <!-- Central Icon (Simplified G?) -->
  <path d="M40 22 C36 18, 28 18, 24 22 C20 26, 20 38, 24 42 C28 46, 36 46, 40 42 L40 32 L32 32" fill="none" stroke="#E8A444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- The dot of the question mark integrated -->
  <circle cx="46" cy="46" r="4" fill="#22D3EE" filter="url(#glow)"/>
</svg>
