[package]
name = "whoiswho"
version = "0.1.0"
edition = "2023_01"
cairo-version = "=2.12.1"
license = "MIT"

[cairo]
sierra-replace-ids = true

[scripts]
build = "sozo build"
test = "scarb cairo-test"
migrate = "sozo build && sozo migrate"

[dependencies]
starknet = "=2.12.1"
dojo = { git = "https://github.com/dojoengine/dojo", tag = "v1.7.0-alpha.2" }
dojo_macros = { git = "https://github.com/dojoengine/dojo", tag = "v1.7.0-alpha.2" }

[[target.starknet-contract]]
build-external-contracts = ["dojo::world::world_contract::world"]
sierra = true
casm = true

[dev-dependencies]
cairo_test = "=2.12.1"
dojo_cairo_test = { git = "https://github.com/dojoengine/dojo", tag = "v1.7.0-alpha.2" }
