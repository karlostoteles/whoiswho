[package]
name = "whoiswho"
version = "0.1.0"
edition = "2023_01"
cairo-version = "=2.13.1"
license = "MIT"

[cairo]
sierra-replace-ids = true

[scripts]
test = "scarb cairo-test"
migrate = "sozo build && sozo migrate"
build-contracts = "sozo build"

[dependencies]
starknet = "=2.13.1"
dojo = "1.8.0"

[[target.starknet-contract]]
build-external-contracts = ["dojo::world::world_contract::world"]
sierra = true
casm = true

[dev-dependencies]
cairo_test = "=2.13.1"
dojo_cairo_test = "1.8.0"
